<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Door James - Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">
        <h3 class="mb-4">📅 Book Meeting Room</h3>

        <form action="/book" method="post">

            <input type="text" name="roomName" placeholder="Room Name" class="form-control mb-3" required />
            <input type="text" name="dateTime" placeholder="Date Time" class="form-control mb-3" required />
            <input type="text" name="colleagues" placeholder="Emails" class="form-control mb-3" />

            <button class="btn btn-primary w-100">Book Room</button>
        </form>
    </div>

    <div class="card mt-5 p-4 shadow">
        <h4>📊 All Bookings</h4>

        <table class="table mt-3">
            <tr>
                <th>Room</th>
                <th>Time</th>
                <th>Join</th>
            </tr>

            <tr th:each="b : ${bookings}">
                <td th:text="${b.roomName}"></td>
                <td th:text="${b.dateTime}"></td>
                <td>
                    <a th:href="${b.meetingLink}" class="btn btn-success btn-sm">Join</a>
                </td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
