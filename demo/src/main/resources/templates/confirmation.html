<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Confirmation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <!-- ✅ Success Message -->
    <div class="alert alert-success" th:text="${success}"></div>

    <h3>Booking Details</h3>

    <p><b>Room:</b> <span th:text="${booking.roomName}"></span></p>
    <p><b>Time:</b> <span th:text="${booking.dateTime}"></span></p>

    <!-- ✅ STEP 6: SHOW LINK -->
    <p>
        <b>Meeting Link:</b>
        <a th:href="${booking.meetingLink}" target="_blank">
            Join Meeting
        </a>
    </p>

    <a href="/bookings" class="btn btn-primary">Back</a>

</div>

</body>
</html>
